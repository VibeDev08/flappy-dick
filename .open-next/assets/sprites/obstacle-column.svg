<svg width="220" height="520" viewBox="0 0 220 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main pipe body - classic Flappy Bird green -->
  <rect x="45" y="0" width="130" height="520" rx="8" fill="#5cb85c"/>
  
  <!-- Pipe highlight for 3D effect -->
  <rect x="52" y="0" width="20" height="520" fill="#7cd47c" fill-opacity="0.6"/>
  
  <!-- Darker rim/edge -->
  <rect x="40" y="0" width="8" height="520" fill="#3d8f3d"/>
  <rect x="172" y="0" width="8" height="520" fill="#3d8f3d"/>
  
  <!-- Top lip (the flared part) - classic Flappy Bird look -->
  <rect x="25" y="0" width="170" height="48" rx="8" fill="#5cb85c"/>
  <rect x="30" y="8" width="160" height="28" fill="#7cd47c"/>
  
  <!-- Bottom lip (for the bottom pipe) will be handled by flipping -->
</svg>
